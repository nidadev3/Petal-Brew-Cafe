<!DOCTYPE html>
<html lang="en"class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="dist/output.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <title>Cart - BrewPetal Cafe</title>
</head>

<body class="bg-[#f7f3e8] font-poppins">

<!-- NAVBAR -->
<nav class="flex items-center justify-between px-10 py-6 bg-[#d9e0cb] text-[#582f0e] sticky top-0 shadow-md">
    <h1 class="font-cinzel font-bold text-3xl">BrewPetal Cafe</h1>
   <ul class="font-poppins text-[20px] flex space-x-10">
    <div class="mr-24 flex space-x-10">
    <li><a href="index.html"class="nav-link hover:border-b-2 hover:border-[#e06c9f] hover:text-[#e06c9f] pb-1">HOME</a></li>
    <li><a href="menu.html"class="nav-link hover:border-b-2 hover:border-[#e06c9f] hover:text-[#e06c9f] pb-1">MENU</a></li>
    <li><a href="about.html"class="nav-link hover:border-b-2 hover:border-[#e06c9f] hover:text-[#e06c9f] pb-1">ABOUT</a></li>
    <li><a href="cart.html" class="nav-link hover:border-b-2 hover:border-[#e06c9f] hover:text-[#e06c9f] pb-1"> <i class="fa-solid fa-cart-arrow-down"></i></a></li>  </div>
    <li>
  <a href="contact.html" 
     class="nav-link bg-[#6e9887] px-4 py-2 pr-5 rounded-full 
     text-[#d9e0cb] font-poppins text-[20px]
     hover:bg-[#efb5ce] hover:text-[#582f0e]
     transition duration-300 ease-in-out
     hover:scale-105 shadow-md hover:shadow-xl inline-block">
    Contact Us
  </a>
</li>
   </ul>
</nav>
<!-- CART SECTION -->
<section class="px-10 py-16">

  <h1 class="text-3xl font-cinzel font-bold text-[#7a5a3a] text-center mb-10">
    Your Cart
  </h1>

  <!-- Items yahan JS se aayenge -->
  <div id="cartItems" class="max-w-3xl mx-auto space-y-4"></div>

  <!-- Empty message -->
  <p id="emptyMsg" class="hidden text-center text-[#e06c9f] font-poppins text-[20px] mt-10">
    Your cart is empty!
  </p>

  <!-- TOTAL -->
  <div id="cartBottom" class=" hidden text-right mt-10 max-w-3xl mx-auto">
    <p class="text-xl font-semibold text-[#582f0e]">
      Total: <span id="totalPrice">Rs 0</span>
    </p>

    <button id="clearCart"
            class="mt-4 bg-[#6e9887] px-4 py-2 pr-5 rounded-full 
            text-[#d9e0cb] font-poppins text-[20px] font-medium
            hover:bg-[#efb5ce] hover:text-[#582f0e]
            transition duration-300 ease-in-out
            hover:scale-105 shadow-md hover:shadow-xl inline-block">
      Clear Cart
    </button>

    <button id="checkoutBtn" class="mt-4 ml-3 bg-[#6e9887] px-4 py-2 pr-5 rounded-full 
            text-[#d9e0cb] font-poppins text-[20px] font-medium
            hover:bg-[#efb5ce] hover:text-[#582f0e]
            transition duration-300 ease-in-out
            hover:scale-105 shadow-md hover:shadow-xl inline-block">
      Checkout
    </button>
  </div>
  

</section>

<!-- FOOTER -->
<footer class="bg-[#f7f3e8] px-10 py-10 text-center">

  <!-- Quote -->
  <p class="text-[#582f0e] italic mb-4">
    “Where every sip and bloom feels like home.”
  </p>

  <!-- Links -->
  <div class="flex justify-center gap-6 mb-4 text-[#6e9887]">
    <a href="index.html" class="hover:text-[#efb5ce]">Home</a>
    <a href="menu.html" class="hover:text-[#efb5ce]">Menu</a>
    <a href="about.html" class="hover:text-[#efb5ce]">About</a>
  </div>

  <!-- Copyright -->
  <p class="text-sm text-gray-500">
    © 2026 BrewPetal Cafe. All rights reserved.
  </p>

</footer>
<script src="JS/nav.js"></script>
<script src="JS/cart.js"></script>
</body>
</html>
