<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="../dist/output.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <title>Admin Dashboard - BrewPetal</title>
</head>
<body class="bg-[#f7f3e8] font-poppins">
<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-[#d9e0cb] p-6 flex flex-col gap-6 fixed h-full shadow-md">
        <h1 class="font-cinzel font-bold text-2xl text-[#582f0e]">BrewPetal Admin</h1>
        <nav class="flex flex-col gap-3">
            <a href="dashboard.html" class="flex items-center gap-3 text-[#582f0e] px-4 py-3 rounded-xl hover:bg-[#efb5ce] hover:text-[#582f0e] transition">
                <i class="fa-solid fa-house"></i> Dashboard
            </a>
            <a href="orders.html" class="flex items-center gap-3 bg-[#6e9887] text-[#d9e0cb] px-4 py-3 rounded-xl hover:bg-[#efb5ce] hover:text-[#582f0e] transition">
                <i class="fa-solid fa-bag-shopping"></i> Orders
            </a>
            <a href="products.html" class="flex items-center gap-3 text-[#582f0e] px-4 py-3 rounded-xl hover:bg-[#efb5ce] hover:text-[#582f0e] transition">
                <i class="fa-solid fa-mug-hot"></i> Products
            </a>
        </nav>
        <div class="mt-auto">
            <a href="../index.html" class="flex items-center gap-3 text-[#582f0e] px-4 py-3 rounded-xl hover:bg-[#efb5ce] transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Site
            </a>
        </div>
    </aside>
    <!-- MAIN CONTENT -->
    <main class="ml-64 flex-1 p-10">

        <h2 class="font-cinzel text-[40px] font-bold text-[#7a5a3a] mb-8">
            Orders
        </h2>

        <div class="bg-[#f7f3e8] p-6 rounded-2xl shadow-md">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-pink-200">
                        <th class="pb-3 text-[#6e9887]">Order ID</th>
                        <th class="pb-3 text-[#6e9887]">Date</th>
                        <th class="pb-3 text-[#6e9887]">Total</th>
                        <th class="pb-3 text-[#6e9887]">Status</th>
                        <th class="pb-3 text-[#6e9887]">Action</th>
                    </tr>
                </thead>
                <tbody id="ordersTable">
                    <tr>
                        <td colspan="5" class="text-center text-[#e06c9f] py-6">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
    </div>
</body>


</html>
