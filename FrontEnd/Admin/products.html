<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Tailwind CSS -->
    <link rel="stylesheet" href="../dist/output.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

    <title>Admin ProductDashboard - BrewPetal</title>
</head>
<body class="bg-[#f7f3e8] font-poppins">
    <div class="flex min-h-screen">
<!-- SIDEBAR -->
    <aside class="w-64 bg-[#d9e0cb] p-6 flex flex-col gap-6 fixed h-full shadow-md">
        <h1 class="font-cinzel font-bold text-2xl text-[#582f0e]">BrewPetal Admin</h1>
        <nav class="flex flex-col gap-3">
            <a href="dashboard.html" class="flex items-center gap-3 text-[#582f0e] px-4 py-3 rounded-xl hover:bg-[#efb5ce] transition">
                <i class="fa-solid fa-house"></i> Dashboard
            </a>
            <a href="orders.html" class="flex items-center gap-3 text-[#582f0e] px-4 py-3 rounded-xl hover:bg-[#efb5ce] transition">
                <i class="fa-solid fa-bag-shopping"></i> Orders
            </a>
            <a href="products.html" class="flex items-center gap-3 bg-[#6e9887] text-[#d9e0cb] px-4 py-3 rounded-xl hover:bg-[#efb5ce] hover:text-[#582f0e] transition">
                <i class="fa-solid fa-mug-hot"></i> Products
            </a>
        </nav>
        <div class="mt-auto">
            <a href="../index.html" class="flex items-center gap-3 text-[#582f0e] px-4 py-3 rounded-xl hover:bg-[#efb5ce] transition">
                <i class="fa-solid fa-arrow-left"></i> Back to Site
            </a>
        </div>
    </aside>
    <!-- MAIN CONTENT -->
<main class="ml-64 flex-1 p-10">
    <div class="flex justify-between items-center mb-8">
        <h2 class="font-cinzel text-[40px] font-bold text-[#7a5a3a]">Products</h2>
        <button onclick="showAddForm()" class="bg-[#6e9887] text-[#d9e0cb] px-6 py-3 rounded-full font-poppins hover:bg-[#efb5ce]
        hover:text-[#582f0e] transition shadow-md">+ Add Product</button>
    </div>
     <!-- ADD PRODUCT FORM -->
        <div id="addForm" class="hidden bg-white p-6 rounded-2xl shadow-md mb-8">
            <h3 class="font-cinzel text-xl text-[#7a5a3a] mb-4">Add New Product</h3>
            <div class="grid grid-cols-2 gap-4">
                <input id="pName" type="text" placeholder="Product Name"
                    class="p-3 border border-pink-300 rounded-lg font-poppins">
                <input id="pPrice" type="number" placeholder="Price"
                    class="p-3 border border-pink-300 rounded-lg font-poppins">
                <input id="pImage" type="text" placeholder="Image URL"
                    class="p-3 border border-pink-300 rounded-lg font-poppins">
                <select id="pCategory"
                    class="p-3 border border-pink-300 rounded-lg font-poppins text-[#582f0e]">
                    <option value="1">Coffee</option>
                    <option value="2">Flowers</option>
                    <option value="3">Bakery</option>
                </select>
                <textarea id="pDescription" placeholder="Description"
                    class="p-3 border border-pink-300 rounded-lg font-poppins col-span-2"></textarea>
            </div>
            <button onclick="addProduct()"
                class="mt-4 bg-[#6e9887] text-[#d9e0cb] px-6 py-3 rounded-full font-poppins
                hover:bg-[#efb5ce] hover:text-[#582f0e] transition">
                Save Product
            </button>
        </div>
 <!-- PRODUCTS TABLE -->
        <div class="bg-[#f7f3e8] p-6 rounded-2xl shadow-md">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-pink-200">
                        <th class="pb-3 text-[#6e9887]">Name</th>
                        <th class="pb-3 text-[#6e9887]">Category</th>
                        <th class="pb-3 text-[#6e9887]">Price</th>
                        <th class="pb-3 text-[#6e9887]">Stock</th>
                        <th class="pb-3 text-[#6e9887]">Action</th>
                    </tr>
                </thead>
                <tbody id="productsTable">
                    <tr>
                        <td colspan="5" class="text-center text-[#e06c9f] py-6">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

</main>
        
   

    </div>


</body>
</html>
